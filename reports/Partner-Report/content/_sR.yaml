  grouped_intestinal_microbiome_factors_human_milk_high: >
    Human milk feeding is above the reference interquartile range. This suggests
    strong implementation of a protective feeding strategy associated with lower
    infection and NEC risk. Sustain quality and equity of access across patient
    subgroups while monitoring adherence and outcomes.
  grouped_intestinal_microbiome_factors_human_milk_high_probiotic_high: >
    Human milk feeding and probiotic use are both above reference ranges. This
    suggests broad implementation of two microbiome-supportive strategies.
    Although incremental probiotic benefit may be smaller when human milk use is
    already high, it remains uncertain. Sustain quality assurance, equitable
    access to approved products, and outcome monitoring to confirm benefit and
    safety.
  grouped_intestinal_microbiome_factors_human_milk_high_probiotic_inbetween: >
    Human milk feeding is above the reference range while probiotic use is
    within the reference range. In settings with high human milk exposure,
    incremental benefit from routine probiotics may be smaller and remains
    uncertain. Sustain feeding quality and equity, and monitor probiotic
    adherence, NEC, infection, and safety outcomes.
  grouped_intestinal_microbiome_factors_human_milk_high_probiotic_low: >
    Human milk feeding is above the reference range while probiotic use is below
    the reference range. In settings with high human milk exposure, incremental
