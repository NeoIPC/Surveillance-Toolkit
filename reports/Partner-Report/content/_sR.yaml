  grouped_vascular_catheter_rates_cvc_high: >
    Central venous catheter (CVC) utilization is above the reference interquartile
    range. This pattern may reflect higher clinical acuity, differing
    thresholds for central-line insertion, or local practices that favour
    earlier central access. It supports audit of CVC insertion indications,
    adherence to insertion and maintenance bundles, monitoring of central-line
    associated infection rates, and efforts to identify opportunities for
    earlier removal where clinically appropriate.
  grouped_vascular_catheter_rates_cvc_low: >
    Central venous catheter (CVC) utilization is below the reference
    interquartile range. This may indicate comparatively lower central-access
    exposure, successful line-avoidance strategies, or differences in case mix
    and treatment intensity. While reduced central-line exposure can lower the
    risk of central-line associated complications, it is important to confirm
    that access adequacy for timely and effective treatment is maintained and
    that there are no barriers to appropriate central access when required.
    Review of escalation criteria, access pathways, and supply or staffing
    constraints can help interpret this finding.
  grouped_vascular_catheter_rates_pvc_high: >
    Peripheral venous catheter (PVC) utilization is above the reference
    interquartile range. This suggests greater peripheral-access exposure which
    may be favourable if it reduces central-line exposure and associated risks,
    but it can also increase peripheral-line workload and complication risk.
    Review indication criteria for PVCs, replacement frequency, dressing and
    site-care practices, and staff training for peripheral-line management.
    Consider whether higher PVC use is an intentional strategy to avoid central
    lines and evaluate associated outcomes, complication rates, and workload
    implications.
  grouped_vascular_catheter_rates_pvc_high_cvc_high: >
    Both PVC and CVC utilization are above reference ranges, indicating broadly
    elevated vascular-device exposure. This may reflect higher patient acuity,
    intensive treatment requirements, or local practices that favour vascular
    access. Elevated use of both peripheral and central devices increases the
    overall risk of device-associated complications and workload for clinical
    teams. This finding warrants comprehensive assessment of insertion
    indications, adherence to insertion and maintenance bundles for both PVCs
    and CVCs, opportunities to reduce avoidable device days, and monitoring of
    complication and infection rates to prioritise targeted prevention efforts.
  grouped_vascular_catheter_rates_pvc_high_cvc_inbetween: >
    Peripheral venous catheter (PVC) utilization is above the reference
    interquartile range while central venous catheter (CVC) utilization is
    within it. This pattern suggests greater reliance on peripheral access,
    which may be favourable if it reduces central-line exposure and associated
    risks, but it can also increase peripheral-line workload and complication
    risk. Review PVC indication criteria, replacement frequency, and
    peripheral-line management practices, ensure clear escalation pathways to
    central access when clinically required, and interpret findings alongside
    patient acuity and treatment needs.
  grouped_vascular_catheter_rates_pvc_high_cvc_low: >
    PVC utilization is above the reference range while CVC utilization is below
    it. This pattern may suggest greater reliance on peripheral access and a
    deliberate strategy to avoid central-line exposure. This can be favourable if
    it reduces central-line associated risks, but it may increase peripheral-line
    workload and complication rates. Review PVC indication criteria, replacement
    intervals, and site-care practices, monitor peripheral complication rates,
    and ensure clear escalation pathways to central access when clinically
    required. Evaluate outcomes to confirm that reduced central-line use is
    delivering intended patient-safety benefits.
  grouped_vascular_catheter_rates_pvc_inbetween_cvc_high: >
    Central venous catheter (CVC) utilization is above the reference
    interquartile range while peripheral venous catheter (PVC) utilization is
    within it. Overall vascular catheter utilization may therefore be elevated
    compared with the reference population and should be interpreted in the
    context of patient acuity and case mix. This pattern may reflect higher
    clinical acuity, earlier escalation to central access, or differing
    thresholds for central-line use, and supports review of CVC insertion
    indications, adherence to insertion and maintenance bundles, and
    opportunities for early removal.
  grouped_vascular_catheter_rates_pvc_inbetween_cvc_low: >
    PVC utilization is within the reference range while CVC utilization is below
    it. Overall vascular catheter utilisation may therefore be lower or similar to
    the reference population with particularly low central-line exposure. This
    could reflect successful central-line avoidance strategies, lower case
    acuity, or differences in access policies. While this can be favourable in
    terms of reducing central-line associated risks, confirm that access
    adequacy for necessary therapies is maintained and review escalation
    pathways and clinician training to ensure safe, timely treatment delivery.
  grouped_vascular_catheter_rates_pvc_low: >
    Peripheral venous catheter (PVC) utilization is below the reference
    interquartile range. This may indicate reduced peripheral-access exposure or
    more selective use of PVCs, reflecting either lower treatment intensity or a
    deliberate strategy to minimise peripheral cannulation. Interpret this in
    the context of overall vascular access patterns and treatment needs to
    ensure that reduced PVC use is not causing delays in therapy or increasing
    reliance on central access. Review local policies on PVC indication and
    replacement to confirm they align with best practice.
  grouped_vascular_catheter_rates_pvc_low_cvc_high: >
    PVC utilization is below the reference range while CVC utilization is above
    it. This pattern may indicate earlier escalation to central access, lower
    use of peripheral bridging approaches, or a case mix demanding central
    access. Because higher CVC use increases the risk of central-line
    associated complications, this finding supports a focused review of vascular
    access decision pathways, criteria for escalation, and adherence to CVC
    insertion and maintenance bundles. Consider whether opportunities exist to
    safely increase peripheral strategies without compromising treatment needs.
  grouped_vascular_catheter_rates_pvc_low_cvc_inbetween: >
    Peripheral venous catheter (PVC) utilization is below the reference
    interquartile range while central venous catheter (CVC) utilization is
    within it. Overall vascular catheter utilisation may therefore be slightly
    reduced compared with the reference population. This pattern could reflect
    selective use of PVCs, differences in peripheral-line policies, or a case
    mix requiring more central access relative to peripheral access. Interpret
    these findings alongside treatment intensity, escalation practices, and
    access adequacy to ensure that therapy delivery remains timely and
    appropriate.
  grouped_vascular_catheter_rates_pvc_low_cvc_low: >
    Both PVC and CVC utilization are below reference ranges. This indicates a
    consistently lower overall vascular-device exposure which may reflect
    successful minimisation of invasive access, differences in case mix, or
    lower treatment intensity. While this can be favourable from an infection
    prevention perspective, it is important to ensure that adequate access for
    timely therapies is not compromised. Review clinical pathways, escalation
    criteria, and outcomes to confirm that low device exposure aligns with
    patient care needs and does not delay necessary interventions.
  grouped_ventilatory_support_rates_inv_high: >
    Invasive ventilatory support utilization is above the reference interquartile
    range. This may reflect higher respiratory acuity, lower intubation
    thresholds, or prolonged invasive ventilation. Review intubation indications,
    weaning practices, infection-prevention measures, and invasive-ventilation
    outcomes.
  grouped_ventilatory_support_rates_inv_low: >
    Invasive ventilatory support utilization is below the reference
    interquartile range. This may reflect successful non-invasive support,
    lower case acuity, or different intubation thresholds. Confirm that reduced
    invasive use is clinically appropriate and does not delay needed intubation.
  grouped_ventilatory_support_rates_niv_high: >
    Non-invasive ventilatory support utilization is above the reference
    interquartile range. This may reflect an intentional strategy to reduce
    invasive exposure and can be favourable from an infection-prevention
    perspective. Review non-invasive initiation criteria, monitoring, failure and
    escalation rates, and staff training to confirm safety and effectiveness.
  grouped_ventilatory_support_rates_niv_high_inv_high: >
    Non-invasive and invasive support are both above reference ranges,
    indicating elevated use across modalities. This may reflect high respiratory
    burden or variable escalation practices. Review disease severity,
    modality transition decisions, and opportunities to optimise support
    duration.
  grouped_ventilatory_support_rates_niv_high_inv_inbetween: >
    Non-invasive support is above the reference range while invasive support is within
    the reference range. This profile is compatible with increased non-invasive support and
    potentially lower invasive exposure. Assess non-invasive success and failure
    rates, and identify subgroups driving higher exposure.
  grouped_ventilatory_support_rates_niv_high_inv_low: >
    Non-invasive support is above the reference range while invasive support is below
    the reference range. This may indicate a deliberate non-invasive strategy and can be
    favourable for infection prevention if safely delivered. Review workload,
    device management, and escalation safety.
  grouped_ventilatory_support_rates_niv_inbetween_inv_high: >
    Non-invasive support is within the reference range while invasive support is above it.
    This discordant profile suggests invasive exposure concentrated in a
    subgroup. Investigate case mix, escalation patterns, and outcomes for that
    subgroup.
  grouped_ventilatory_support_rates_niv_inbetween_inv_low: >
    Non-invasive support is within the reference range while invasive support is below
    the reference range. This may indicate effective non-invasive support and reduced
    invasive exposure. Review non-invasive success rates, escalation
    timing, and clinical outcomes.
  grouped_ventilatory_support_rates_niv_low: >
    Non-invasive ventilatory support utilization is below the reference
    interquartile range. This may indicate limited non-invasive use, earlier
    progression to invasive modes, or lower respiratory burden. Interpret this
    with invasive-support patterns and case mix, and review whether safe
    expansion of non-invasive support is feasible.
  grouped_ventilatory_support_rates_niv_low_inv_high: >
    Non-invasive support is below the reference range while invasive support is above
    the reference range. This profile suggests earlier or more frequent progression to
    intubation. Review escalation thresholds, intubation criteria, and drivers
    of prolonged invasive duration.
  grouped_ventilatory_support_rates_niv_low_inv_inbetween: >
    Non-invasive support is below the reference range while invasive support is within
    the reference range. This may reflect limited non-invasive use with proportionate invasive
    exposure. Review modality selection, escalation practice, and opportunities
    to strengthen safe non-invasive support.
  grouped_ventilatory_support_rates_niv_low_inv_low: >
    Non-invasive and invasive support are both below reference ranges. This
    suggests broadly reduced respiratory-support exposure, potentially due to
    case mix or lower acuity. Confirm that modality access and escalation remain
    adequate when respiratory status worsens.
  grouped_ventilatory_support_rates_vs_high: >
    Overall ventilatory support utilization is above the reference interquartile
    range. This pattern may reflect higher respiratory acuity, lower thresholds
    for support initiation, or prolonged support durations. Review case mix,
    initiation and weaning criteria, and opportunities to reduce avoidable
    support duration while maintaining safe escalation pathways.
  grouped_ventilatory_support_rates_vs_high_inv_high: >
    Overall ventilatory support and invasive support are both above reference
    ranges. This indicates elevated respiratory burden with increased invasive
    exposure. Conduct a comprehensive review of airway management, duration of
    invasive ventilation, weaning, and infection-prevention measures.
  grouped_ventilatory_support_rates_vs_high_inv_inbetween: >
    Overall ventilatory support is above the reference range while invasive support is
    within the reference range. This may reflect increased use of non-invasive support, which
    can be favourable from an infection-prevention perspective. Review
    non-invasive protocols, failure rates, and escalation thresholds, and assess
    whether higher total support burden is driven by prolonged duration.
  grouped_ventilatory_support_rates_vs_high_inv_low: >
    Overall ventilatory support is above the reference range while invasive support is
    below the reference range. This pattern is compatible with greater reliance on
    non-invasive modalities and can be favourable from an infection-prevention
    perspective. Review non-invasive protocols, failure rates, and escalation
    thresholds to ensure timely intubation when required.
  grouped_ventilatory_support_rates_vs_high_niv_high: >
    Overall ventilatory support and non-invasive support are both above
    reference ranges. This may reflect substantial respiratory burden alongside
    high use of non-invasive pathways, which can be IPC-favourable if safe.
    Review capacity, staff training, failure rates, and outcomes.
  grouped_ventilatory_support_rates_vs_high_niv_high_inv_high: >
    Overall, non-invasive, and invasive ventilatory support rates are all above
    reference ranges. This indicates substantially elevated respiratory-support
    burden across modalities. Conduct comprehensive review of respiratory
    pathways, escalation decisions, support duration, and infection-prevention
    practices.
  grouped_ventilatory_support_rates_vs_high_niv_high_inv_inbetween: >
    Overall ventilatory support and non-invasive support are above the reference range
    while invasive support is within the reference range. This may indicate high non-invasive
    exposure without excess invasive escalation. Assess non-invasive success,
    subgroup contributions, and escalation safety.
  grouped_ventilatory_support_rates_vs_high_niv_high_inv_low: >
    Overall ventilatory support is above the reference range, with non-invasive support
    above and invasive support below the reference range. This profile is compatible with
    emphasis on non-invasive pathways and may be IPC-favourable if safe. Review
    failure, escalation, and outcome metrics.
  grouped_ventilatory_support_rates_vs_high_niv_inbetween: >
    Overall ventilatory support is above the reference range while non-invasive support is
    within the reference range. This suggests increased total burden not fully explained by
    non-invasive exposure alone. Evaluate case mix, support-duration distribution,
    and weaning practices.
  grouped_ventilatory_support_rates_vs_high_niv_inbetween_inv_high: >
    Overall ventilatory support and invasive support are above the reference range while
    non-invasive support is within the reference range. This indicates increased invasive
    burden contributing to higher total exposure. Review intubation practices,
    invasive duration, and patient outcomes.
  grouped_ventilatory_support_rates_vs_high_niv_inbetween_inv_inbetween: >
    Overall ventilatory support is above the reference range while component modalities are
    both within the reference range. This suggests increased total burden not attributable to
    one modality alone. Audit support duration, case mix, and data classification to
    identify underlying drivers.
  grouped_ventilatory_support_rates_vs_high_niv_inbetween_inv_low: >
    Overall ventilatory support is above the reference range while non-invasive support is
    within the reference range and invasive support is below the reference range. This may reflect prolonged
    non-invasive durations driving total burden without parallel invasive
    increase. Review duration patterns and escalation timing.
  grouped_ventilatory_support_rates_vs_high_niv_low: >
    Overall ventilatory support is above the reference range while non-invasive support is
    below the reference range. This discordant profile may indicate greater reliance on
    invasive ventilation or prolonged invasive duration. Review initiation and
    escalation thresholds, intubation practices, and drivers of invasive days.
  grouped_ventilatory_support_rates_vs_high_niv_low_inv_high: >
    Overall ventilatory support is above the reference range, with invasive support above
    the reference range and non-invasive support below the reference range. This pattern indicates
    substantial invasive-driven burden. Investigate case mix, intubation
    thresholds, duration, and outcomes.
  grouped_ventilatory_support_rates_vs_high_niv_low_inv_inbetween: >
    Overall ventilatory support is above the reference range while non-invasive support is
    low and invasive support is within the reference range. This may indicate reduced
    non-invasive use despite high overall burden. Review escalation choices,
    modality selection, and weaning practice.
  grouped_ventilatory_support_rates_vs_high_niv_low_inv_low: >
    Overall ventilatory support is above the reference range while both non-invasive and
    invasive components are below the reference range. This discordant profile may indicate
    data-classification or denominator issues. Review metric definitions, data
    completeness, and support coding workflows.
  grouped_ventilatory_support_rates_vs_inbetween_inv_high: >
    Overall ventilatory support is within the reference range while invasive support is
    above the reference range. This indicates invasive ventilation concentrated in a subgroup.
    Review intubation criteria, duration, and outcomes, and assess whether
    earlier non-invasive optimisation is possible.
  grouped_ventilatory_support_rates_vs_inbetween_inv_low: >
    Overall ventilatory support is within the reference range while invasive support is
    below the reference range. This may reflect effective non-invasive support and can be
    favourable from an IPC perspective. Review escalation-to-intubation metrics,
    thresholds, and outcomes.
  grouped_ventilatory_support_rates_vs_inbetween_niv_high: >
    Overall ventilatory support is within the reference range while non-invasive support is
    above the reference range. This suggests a preference for non-invasive modalities within a
    typical overall burden and may be favourable from an IPC perspective.
    Evaluate escalation rates and clinical outcomes.
  grouped_ventilatory_support_rates_vs_inbetween_niv_high_inv_high: >
    Overall ventilatory support is within the reference range while both non-invasive and
    invasive components are above the reference range. This discordant profile suggests
    heterogeneity across subgroups or modality-classification differences.
    Perform subgroup analysis and verify metric definitions.
  grouped_ventilatory_support_rates_vs_inbetween_niv_high_inv_inbetween: >
    Overall ventilatory support is within the reference range while non-invasive support is
    above the reference range and invasive support is within the reference range. This may indicate greater
    use of non-invasive pathways without excess invasive exposure. Assess whether
    specific subgroups drive this pattern and confirm escalation safety.
  grouped_ventilatory_support_rates_vs_inbetween_niv_high_inv_low: >
    Overall ventilatory support is within the reference range while non-invasive support is
    above the reference range and invasive support is below the reference range. This pattern may represent
    successful non-invasive support with lower invasive exposure and potential
    IPC benefit. Review safety outcomes and escalation reliability.
  grouped_ventilatory_support_rates_vs_inbetween_niv_low: >
    Overall ventilatory support is within the reference range while non-invasive support is
    below the reference range. This may reflect earlier progression to invasive modes or
    under-use of non-invasive support. Review initiation thresholds,
    decision-making, and modality availability.
  grouped_ventilatory_support_rates_vs_inbetween_niv_low_inv_high: >
    Overall ventilatory support is within the reference range while invasive support is
    above the reference range and non-invasive support is low. This suggests invasive exposure
    concentrated in a subgroup. Review intubation criteria, duration, outcomes,
    and denominator consistency.
  grouped_ventilatory_support_rates_vs_inbetween_niv_low_inv_inbetween: >
    Overall ventilatory support is within the reference range while non-invasive support is
    low and invasive support is within the reference range. This may reflect limited
    non-invasive use with proportionate invasive exposure. Review initiation
    thresholds, modality access, and outcomes.
  grouped_ventilatory_support_rates_vs_inbetween_niv_low_inv_low: >
    Overall ventilatory support is within the reference range while non-invasive and
    invasive components are both below the reference range. This may indicate few infants need
    modality-specific support or differences in modality assignment. Verify data
    capture and assess whether local pathways explain low component rates.
  grouped_ventilatory_support_rates_vs_low: >
    Overall ventilatory support utilization is below the reference interquartile
    range. This may reflect lower respiratory acuity, effective prevention and
    weaning practices, or local thresholds for initiating support. While lower
    support exposure can be favourable, confirm that access to escalation remains
    timely and that reduced use is not associated with adverse outcomes.
  grouped_ventilatory_support_rates_vs_low_inv_high: >
    Overall ventilatory support is below the reference range while invasive support is
    above the reference range. This discordant profile suggests concentrated invasive burden in
    a subgroup and warrants focused review of intubation criteria, invasive
    duration drivers, and outcomes. Verify subgroup case mix and denominator
    assignment to support valid interpretation.
  grouped_ventilatory_support_rates_vs_low_inv_inbetween: >
    Overall ventilatory support is below the reference range while invasive support is
    within the reference range. This may indicate invasive ventilation concentrated in a
    smaller subgroup. Verify denominators and case mix, and review escalation
    pathways and outcomes for that subgroup.
  grouped_ventilatory_support_rates_vs_low_inv_low: >
    Overall ventilatory support and invasive support are both below reference
    ranges. This suggests lower total respiratory exposure, including reduced
    invasive exposure. Confirm that low invasive use remains appropriate
    and is not associated with delayed intubation when needed.
  grouped_ventilatory_support_rates_vs_low_niv_high: >
    Overall ventilatory support is below the reference range while non-invasive support is
    above the reference range. This pattern may reflect preference for non-invasive pathways,
    which can be favourable for infection prevention if safe. Review failure and
    escalation rates, workload, and outcomes.
  grouped_ventilatory_support_rates_vs_low_niv_inbetween: >
    Overall ventilatory support is below the reference range while non-invasive support is
    within the reference range. This may indicate selective non-invasive use in a low-burden
    population. Review initiation criteria, denominators, and targeting of
    non-invasive support.
  grouped_ventilatory_support_rates_vs_low_niv_inbetween_inv_high: >
    Overall ventilatory support is below the reference range while invasive support is
    above the reference range. This may indicate invasive-driven burden concentrated in a
    small subgroup. Review case mix, denominator assignment, and drivers of
    prolonged invasive support.
  grouped_ventilatory_support_rates_vs_low_niv_inbetween_inv_inbetween: >
    Overall ventilatory support is below the reference range while component modalities are
    within the reference range. This suggests lower total support burden with broadly typical
    modality distribution. Continue trend monitoring and review any shifts in
    escalation patterns.
  grouped_ventilatory_support_rates_vs_low_niv_inbetween_inv_low: >
    Overall ventilatory support is below the reference range, with non-invasive support
    within the reference range and invasive support below the reference range. This may reflect targeted
    non-invasive support in a low-burden population. Assess safety outcomes
    and timeliness of escalation when needed.
  grouped_ventilatory_support_rates_vs_low_niv_low: >
    Overall ventilatory support and non-invasive support are both below
    reference ranges. This suggests a generally lower respiratory-support burden,
    potentially related to case mix or effective prevention and weaning. Confirm
    that escalation pathways remain timely for infants who deteriorate.
  grouped_ventilatory_support_rates_vs_low_niv_low_inv_high: >
    Overall and non-invasive support are below the reference range, while invasive support
    is above the reference range. This discordant pattern suggests high invasive exposure in a
    subgroup and warrants review of intubation practices, invasive-duration
    drivers, and outcomes. Confirm subgroup case mix and denominator
    consistency when interpreting this pattern.
  grouped_ventilatory_support_rates_vs_low_niv_low_inv_inbetween: >
    Overall and non-invasive support are below the reference range, while invasive support
    is within the reference range. This may indicate invasive ventilation concentrated in a
    smaller high-acuity subgroup. Verify denominators, case mix, and escalation
    policies for that subgroup.
  grouped_ventilatory_support_rates_vs_low_niv_low_inv_low: >
    Overall, non-invasive, and invasive ventilatory support rates are all below
    reference ranges. This consistent low-exposure profile may reflect lower
    respiratory acuity or effective prevention and weaning. Confirm escalation
    readiness and modality access for infants who require support.
