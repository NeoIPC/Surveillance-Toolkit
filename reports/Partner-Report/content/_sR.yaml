# NeoIPC Partner Report — String Resources
#
# Layer 3 in the string resource cascade (after glossary.yaml, common.yaml).
# Report-specific strings: figure interpretations, table captions,
# section headings, footnotes, and labels.
#
# Translated via po4a (po/reports.po4a.cfg) and Weblate.
# Do not edit generated files (content.<lang>/_sR.yaml) — edit .po files instead.
#
# Language: en_GB

figure_interpretation:
  birth_weight_higher_median: >
    Your unit's median birth weight is higher than the reference population,
    indicating a shift toward higher birth weights in your population. This
    should be considered when interpreting infection rates and other clinical
    outcomes.
  birth_weight_lower_median: >
    Your unit’s median birth weight is lower than the reference population,
    indicating a shift toward lower birth weights in your population. This
    should be considered when interpreting infection rates and other clinical
    outcomes.
  birth_weight_similar_median: >
    Your unit's median birth weight is similar to the reference population,
    suggesting comparable case mix in terms of birth weight distribution.
    This facilitates direct comparison of infection rates and clinical outcomes.
  gestational_age_higher_median: >
    Your unit's median gestational age is higher than the reference population,
    indicating a shift toward higher gestational ages in your population. This
    should be considered when interpreting infection rates and other clinical
    outcomes.
  gestational_age_lower_median: >
    Your unit's median gestational age is lower than the reference population,
    indicating a shift toward lower gestational ages in your population. This
    should be considered when interpreting infection rates and other clinical
    outcomes.
  gestational_age_similar_median: >
    Your unit's median gestational age is similar to the reference population,
    indicating comparable patient maturity profiles. This similarity in case mix
    facilitates meaningful comparison of infection prevention outcomes.
  heading: "Comparison with reference population"
  narrower_distribution: >
    Your unit shows a narrower distribution (smaller interquartile range),
    suggesting more homogeneous patient characteristics compared to the
    reference population.
  no_outliers: >
    All metrics fall within the interquartile range (25th-75th percentile) of
    the reference population, suggesting similiar patient characteristics.
  wider_distribution: >
    Your unit shows a wider distribution (larger interquartile range),
    indicating more heterogeneous patient characteristics compared to the
    reference population.

headerList:
  averageSurveillancePeriod: Average surveillance period per patient
  benchmarkComparabilityHeader: Benchmark composition
  effectiveAnalysisPeriodFootnote: >
    The effective analysis period is the time span between the surveillance end
    date of the earliest included patient and the surveillance end date of the
    latest included patient in the dataset.
  filterDiffersFootnote: >
    Note: This filter differs from the reference dataset.
  multiCountryBenchmarkHint: >
    The reference data aggregates information from neonatal units in several
    countries. While ideally a single-country benchmark would be preferable,
    aggregating data across multiple countries is pragmatically necessary when
    sufficient data from a single country is not available. This means that
    comparability may be limited due to different healthcare systems and
    resources available in different countries.
  numberOfAdmissions: Number of patient admissions
  numberOfDepartments: Number of units contributing at least one patient record
  numberOfPatients: Number of patient records
  singleCountryBenchmarkHint: >
    The reference data presents information from neonatal units in a single
    country. While this provides a more relevant benchmark due to the relative
    homogeneity of the healthcare system, your unit's country differs from the
    reference country, which may affect comparability.
  sumOfPatientDays: Sum of patient days
  wbClassMismatchAddendum: >
    Additionally, the World Bank income classifications differ between your data
    and the reference data (%s: %s; %s: %s), which may indicate even more
    substantial differences in healthcare system resources and infrastructure,
    further affecting comparability of certain indicators.

