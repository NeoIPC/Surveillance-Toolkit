# NeoIPC Partner Report — String Resources
#
# Layer 3 in the string resource cascade (after glossary.yaml, common.yaml).
# Report-specific strings: figure interpretations, table captions,
# section headings, footnotes, and labels.
#
# Translated via po4a (po/reports.po4a.cfg) and Weblate.
# Do not edit generated files (content.<lang>/_sR.yaml) — edit .po files instead.
#
# Language: en_GB

figure_interpretation:
  birth_weight_higher_median: >
    Your department's median birth weight is higher than the reference population,
    indicating a shift toward higher birth weights in your population. This
    should be considered when interpreting infection rates and other clinical
    outcomes.
  birth_weight_lower_median: >
    Your department’s median birth weight is lower than the reference population,
    indicating a shift toward lower birth weights in your population. This
    should be considered when interpreting infection rates and other clinical
    outcomes.
  birth_weight_similar_median: >
    Your department's median birth weight is similar to the reference population,
    suggesting comparable case mix in terms of birth weight distribution.
    This facilitates direct comparison of infection rates and clinical outcomes.
  gestational_age_higher_median: >
    Your department's median gestational age is higher than the reference population,
    indicating a shift toward higher gestational ages in your population. This
    should be considered when interpreting infection rates and other clinical
    outcomes.
  gestational_age_lower_median: >
    Your department's median gestational age is lower than the reference population,
    indicating a shift toward lower gestational ages in your population. This
    should be considered when interpreting infection rates and other clinical
    outcomes.
  gestational_age_similar_median: >
    Your department's median gestational age is similar to the reference population,
    indicating comparable patient maturity profiles. This similarity in case mix
    facilitates meaningful comparison of infection prevention outcomes.
  narrower_distribution: >
    Your department shows a narrower distribution (smaller interquartile range),
    suggesting more homogeneous patient characteristics compared to the
    reference population.
  no_outliers: >
    All metrics fall within the interquartile range (25th-75th percentile) of
    the reference population, suggesting similiar patient characteristics.
  wider_distribution: >
    Your department shows a wider distribution (larger interquartile range),
    indicating more heterogeneous patient characteristics compared to the
    reference population.

headerList:
  benchmarkComparabilityHeader: Benchmark composition
  effectiveAnalysisPeriodFootnote: >
    The effective analysis period is the time span between the surveillance end
    date of the earliest included patient and the surveillance end date of the
    latest included patient in the dataset.
  filterDiffersFootnote: >
    Note: This filter differs from the reference dataset.
  multiCountryBenchmarkHint: >
    The reference data aggregates information from neonatal departments in several
    countries. While ideally a single-country benchmark would be preferable,
    aggregating data across multiple countries is pragmatically necessary when
    sufficient data from a single country is not available. This means that
    comparability may be limited due to different healthcare systems and
    resources available in different countries.
  singleCountryBenchmarkHint: >
    The reference data presents information from neonatal departments in a single
    country. While this provides a more relevant benchmark due to the relative
    homogeneity of the healthcare system, your department's country differs from the
    reference country, which may affect comparability.
  wbClassMismatchAddendum: >
    Additionally, the World Bank income classifications differ between your data
    and the reference data (%s: %s; %s: %s), which may indicate even more
    substantial differences in healthcare system resources and infrastructure,
    further affecting comparability of certain indicators.

headings:
  antimicrobial_susceptibility_testing: Antimicrobial Susceptibility Testing
  birth_weight_distribution: Birth Weight Distribution
  detection_of_infectious_agents: Detection of Infectious Agents
  device_associated_infections: Device-Associated Infections
  diagnostics: Diagnostics
  gestational_age_distribution: Gestational Age Distribution
  infectious_agents_in_nosocomial_infections: >
    Infectious Agents Detected in Nosocomial Infections
  presence_of_risk_and_protective_factors: Presence of Risk and Protective Factors in Your Department
  resistant_pathogens: Resistant Pathogens
  secondary_bsi: Secondary Bloodstream Infections
  severe_infections_and_nec: >
    Severe Neonatal Infections and Necrotizing Enterocolitis
  surgical_procedures_by_category: Surgical Procedures by Category

outlier:

  # ── Existing interpretation strings ───────────────────────────
  agent_detection_per_inf_type_all_zero: >-
    No pathogens were detected across any infection type during the
    surveillance period.
  agent_detection_per_inf_type_interpretation_all_above: >-
    Pathogen detection rates are above the reference range across
    infection types. Higher detection rates may reflect thorough
    microbiological workup practices.

  # ── Agent detection interpretation ─────────────────────────────────
  agent_detection_per_inf_type_interpretation_all_below: >-
    Pathogen detection rates are below the reference range across
    infection types. Lower detection rates may reflect differences in
    microbiological sampling practices or laboratory capacity.
  agent_detection_per_inf_type_interpretation_some_above: >-
    Higher pathogen detection rates may reflect thorough
    microbiological workup practices for these infection types.
  agent_detection_per_inf_type_interpretation_some_below: >-
    Lower pathogen detection rates may reflect differences in
    microbiological sampling practices or laboratory capacity for
    these infection types.

  # ── Zero early-exit strings (only for hierarchical total metrics) ─
  antibiotic_rate_ab_zero: >-
    No antibiotic exposure was recorded during the surveillance period
    despite available patient day data. This is unusual in a neonatal
    setting and may indicate incomplete data capture, a very small
    population resulting from narrow filter criteria, or generation of
    the report very early after starting surveillance.

  # ── Antibiotic rates interpretation ────────────────────────────────
  antibiotic_rate_interpretation_all_above: >-
    All AWaRe components are above the reference range, suggesting
    broad prescribing intensity rather than a single-category signal.
    This may be considered together with resistance and pathogen
    detection results.
  antibiotic_rate_interpretation_all_below: >-
    All AWaRe components are below the reference range. This may
    reflect lower treatment burden or narrower indications.
  antibiotic_rate_interpretation_gradient_ascending: >-
    The AWaRe profile shows increasing exposure from Access towards
    Watch and Reserve groups, suggesting broader-spectrum prescribing.
    De-escalation practices and indication quality may warrant
    attention.
  antibiotic_rate_interpretation_gradient_descending: >-
    The AWaRe profile follows a de-escalation gradient from Access
    towards lower Watch and Reserve exposure, consistent with more
    conservative spectrum use.
  antibiotic_rate_interpretation_reserve_isolated_high: >-
    AWaRe Reserve-group exposure is elevated while other components
    are not, suggesting selective use of last-resort agents. This
    pattern is typically associated with documented resistant
    pathogens rather than empirical prescribing.
  antibiotic_rate_interpretation_review_resistance: >-
    This may be considered together with resistance and pathogen
    detection results, as Watch- and Reserve-group use may be expected
    to increase where resistant or multidrug-resistant pathogens are
    common.
  antibiotic_rate_interpretation_watch_high: >-
    Elevated Watch-group exposure may reflect broader-spectrum
    empirical prescribing. De-escalation practices and indication
    quality may be relevant considerations.
  antibiotic_rate_interpretation_watch_low: >-
    Low Watch-group exposure may reflect conservative prescribing
    that favours Access-group agents. This may be consistent with
    appropriate antibiotic stewardship practices.
  caution_limited_data: >-
    The reference data is based on fewer than 5 contributing
    departments. Comparisons should be interpreted with caution due
    to limited sample size.
  # ── Composable interpretation framework ───────────────────────
  composed:
    clause_concordant_high: ", consistent with elevated {paired_label} ({paired_ref})"
    clause_concordant_low: ", consistent with low {paired_label} ({paired_ref})"
    clause_discordant_high: " despite elevated {paired_label} ({paired_ref})"
    clause_discordant_low: " despite low {paired_label} ({paired_ref})"
    clause_fallback: >-
      . Reference quartiles for {primary_paired_label}
      ({primary_paired_ref}) are not yet available.
      {fallback_paired_label_sc} is {fallback_position} the reference
      range ({fallback_paired_ref})
    clause_no_quartiles: >-
      . Reference quartiles for {paired_label} ({paired_ref}) are
      not yet available
    clause_within_iqr: ". {paired_label_sc} is within the reference range ({paired_ref})"
    opening_above: "The {metric_label} is above the reference range"
    opening_below: "The {metric_label} is below the reference range"

  # ── Device-associated vascular catheter interpretation ──────────────
  dev_ass_vascular_catheter_interpretation_both_above: >-
    Both CVC-associated sepsis/BSI and PVC-associated sepsis/BSI
    rates are above the reference range. This may suggest broader vascular
    access-associated infection prevention challenges.
  # Single-metric fallback — device-associated vascular catheter
  dev_ass_vascular_catheter_interpretation_cvc_high: >-
    The CVC-associated sepsis/BSI rate is above the reference range,
    which may reflect central-line insertion and maintenance practices
    or case mix differences.
  dev_ass_vascular_catheter_interpretation_cvc_high_pvc_low: >-
    The CVC-associated sepsis/BSI rate is above the reference range
    while the PVC-associated sepsis/BSI rate is below it. Central-line insertion
    and maintenance practices may be a relevant area for assessment.
  dev_ass_vascular_catheter_interpretation_cvc_low: >-
    The CVC-associated sepsis/BSI rate is below the reference range,
    which may reflect effective central-line care practices.
  dev_ass_vascular_catheter_interpretation_pvc_high: >-
    The PVC-associated sepsis/BSI rate is above the reference range,
    which may reflect peripheral-line management practices or case
    mix differences.
  dev_ass_vascular_catheter_interpretation_pvc_high_cvc_low: >-
    The PVC-associated sepsis/BSI rate is above the reference range
    while the CVC-associated sepsis/BSI rate is below it. Peripheral-line
    management practices may be a relevant area for assessment.
  dev_ass_vascular_catheter_interpretation_pvc_low: >-
    The PVC-associated sepsis/BSI rate is below the reference range,
    which may reflect effective peripheral-line care practices.
  # Cross-table context
  dev_ass_vc_interpretation_cvc_high_usage_high: >-
    The CVC-associated sepsis/BSI rate is above the reference range
    in a context where CVC utilization is also high. Higher device
    exposure increases opportunity for infection.
  dev_ass_vc_interpretation_cvc_high_usage_low: >-
    The CVC-associated sepsis/BSI rate is above the reference range
    despite relatively low CVC utilization. Insertion and maintenance
    practices may be a relevant area for assessment.

  # ── Device-associated ventilatory support interpretation ────────────
  dev_ass_ventilatory_support_interpretation_all_above: >-
    Both NIV-associated pneumonia and INV-associated pneumonia
    rates are above the reference range. This may suggest broader respiratory
    care-associated infection prevention challenges.
  # Single-metric fallback — device-associated ventilatory support
  dev_ass_ventilatory_support_interpretation_inv_high: >-
    The INV-associated pneumonia rate is above the reference range,
    which may reflect invasive ventilation care practices or case
    mix differences.
  dev_ass_ventilatory_support_interpretation_inv_high_niv_low: >-
    The INV-associated pneumonia rate is above the reference range
    while the NIV-associated pneumonia rate is below it. Invasive ventilation
    care practices may be a relevant area for assessment.
  dev_ass_ventilatory_support_interpretation_inv_low: >-
    The INV-associated pneumonia rate is below the reference range,
    which may reflect effective invasive ventilation care practices.
  dev_ass_ventilatory_support_interpretation_niv_high: >-
    The NIV-associated pneumonia rate is above the reference range,
    which may reflect non-invasive ventilation practices or case mix
    differences.
  dev_ass_ventilatory_support_interpretation_niv_low: >-
    The NIV-associated pneumonia rate is below the reference range,
    which may reflect effective non-invasive ventilation care
    practices.
  dev_ass_ventilatory_support_vs_zero: >-
    No ventilatory support-associated infections were recorded during
    the surveillance period despite available denominator data.
  # Cross-table context
  dev_ass_vs_interpretation_inv_high_usage_high: >-
    The INV-associated pneumonia rate is above the reference range
    in a context where invasive ventilation utilization is also high.
  dev_ass_vs_interpretation_inv_high_usage_low: >-
    The INV-associated pneumonia rate is above the reference range
    despite relatively low invasive ventilation utilization. Ventilation care practices may be a relevant area
    for assessment.
  framing_above_q3: >-
    The following metrics are above the 75th percentile of the
    reference population:
  # ── Universal framing and fallback ────────────────────────────────
  framing_below_q1: >-
    The following metrics are below the 25th percentile of the
    reference population:
  generic_summary: >-
    The values for {metric_names} are notably different from the
    reference population and should be reviewed in the context of
    your department's clinical setting and case mix.

  heading: "Comparison with reference data"

  # ── Intestinal microbiome interpretation ───────────────────────────
  intestinal_microbiome_interpretation_both_above: >-
    Human milk feeding and probiotic use are both above the reference
    range, suggesting broad implementation of microbiome-supportive
    strategies.
  intestinal_microbiome_interpretation_both_below: >-
    Human milk feeding and probiotic use are both below the reference
    range. This pattern may suggest reduced use of
    microbiome-supportive strategies and may also reflect limited
    availability of approved probiotic products.
  intestinal_microbiome_interpretation_hm_high: >-
    High human milk feeding reflects strong implementation of a
    protective feeding strategy associated with lower infection and
    NEC risk.
  intestinal_microbiome_interpretation_hm_high_pro_low: >-
    Human milk feeding is above the reference range while probiotic
    use is below it. In settings with high human milk exposure, the
    incremental benefit from routine probiotics may be smaller and
    remains uncertain.
  intestinal_microbiome_interpretation_hm_low: >-
    Low human milk feeding may indicate opportunities to strengthen
    lactation support, donor milk availability, or feeding pathways.
    Human milk exposure is associated with lower infection and NEC
    risk.
  intestinal_microbiome_interpretation_hm_low_pro_high: >-
    Human milk feeding is below the reference range while probiotic
    use is above it. This may indicate greater reliance on probiotics
    in a setting with lower human milk exposure. Probiotics are
    typically intended to complement rather than replace human
    milk-based protection.
  intestinal_microbiome_interpretation_pro_high: >-
    High probiotic use suggests broad implementation of a
    microbiome-support strategy where products are available and
    approved.
  intestinal_microbiome_interpretation_pro_low: >-
    Low probiotic use may reflect selective implementation, barriers
    in care pathways, or limited availability of safe, approved
    neonatal probiotic products.
  kangaroo_care_interpretation_high: >-
    High kangaroo mother care (KMC) uptake of this WHO-recommended
    protective intervention is a positive finding, reflecting strong
    implementation of skin-to-skin care practices.

  # ── Kangaroo care interpretation ───────────────────────────────────
  kangaroo_care_interpretation_low: >-
    Low kangaroo mother care (KMC) utilization may indicate barriers
    to implementation such as staffing constraints, department layout,
    parental access restrictions, or documentation practices.
  nec_interpretation_high_despite_microbiome: >-
    The necrotising enterocolitis rate is above the reference range
    despite high human milk feeding and probiotic use. Other
    contributing factors may warrant assessment.

  # ── NEC interpretation (cross-table context) ───────────────────────
  nec_interpretation_high_low_microbiome: >-
    The necrotising enterocolitis rate is above the reference range
    in a context where
    human milk feeding or probiotic use is below it.
    Microbiome-supportive strategies may be a relevant consideration.

  # Definition 2: Primary sepsis/BSI ↔ CVC BSI + PVC BSI (composite)
  pairing_bsi:
    above_is_concerning: true
    action_elevated: >-
      Vascular catheter indication criteria and care bundle adherence
      may be relevant areas for assessment.
    action_elevated_narrowed: >-
      The elevation may be concentrated in non-device-associated
      infections. Blood culture practices and clinical sepsis
      diagnostic criteria may warrant review.
    action_low: >-
      Pathogen detection rates
      (@tbl-infectious-agent-detection-rate) may help confirm this
      reflects effective prevention rather than differences in
      diagnostic practices.
    action_low_narrowed: >-
      This pattern may reflect low non-device-associated BSI.
      Pathogen detection rates
      (@tbl-infectious-agent-detection-rate) may help confirm
      adequate diagnostic workup.
    metric_label: "primary sepsis/BSI rate"
    paired_label: "device-associated BSI rates"

  # Definition 5: CVC-associated sepsis/BSI ↔ CVC utilization (simple)
  pairing_dev_ass_cvc:
    above_is_concerning: true
    action_elevated: >-
      Central line indication criteria and care bundle adherence may
      be relevant areas for assessment.
    action_elevated_narrowed: >-
      A focused review of central line insertion and maintenance
      practices may be warranted rather than utilization patterns.
    action_low: >-
      Pathogen detection rates
      (@tbl-infectious-agent-detection-rate) may help confirm this
      reflects effective central line care rather than differences
      in diagnostic practices.
    action_low_narrowed: >-
      The low infection rate may partly reflect lower device exposure
      rather than care practices alone.
    metric_label: "CVC-associated sepsis/BSI rate"
    paired_label: "CVC utilization"
  pairing_dev_ass_inv:
    above_is_concerning: true
    action_elevated: >-
      Invasive ventilation care practices and pneumonia prevention
      measures may be relevant areas for assessment.
    action_elevated_narrowed: >-
      A focused review of invasive ventilation care practices may be
      warranted rather than utilization patterns.
    action_low: >-
      Pathogen detection for pneumonia
      (@tbl-infectious-agent-detection-rate) may help confirm this
      reflects effective invasive ventilation care rather than
      differences in diagnostic practices.
    action_low_narrowed: >-
      The low pneumonia rate may partly reflect lower invasive
      ventilation exposure rather than care practices alone.
    metric_label: "INV-associated pneumonia rate"
    paired_label: "INV utilization"
  pairing_dev_ass_niv:
    above_is_concerning: true
    action_elevated: >-
      Non-invasive ventilation practices and pneumonia prevention
      measures may be relevant areas for assessment.
    action_elevated_narrowed: >-
      A focused review of non-invasive ventilation care practices may
      be warranted rather than utilization patterns.
    action_low: >-
      This may reflect effective non-invasive ventilation care
      practices.
    action_low_narrowed: >-
      The low pneumonia rate may partly reflect lower non-invasive
      ventilation exposure rather than care practices alone.
    metric_label: "NIV-associated pneumonia rate"
    paired_label: "NIV utilization"
  # Definition 6: PVC-associated sepsis/BSI ↔ PVC utilization (simple)
  pairing_dev_ass_pvc:
    above_is_concerning: true
    action_elevated: >-
      Peripheral line management and dwell time policies may be
      relevant areas for assessment.
    action_elevated_narrowed: >-
      A focused review of peripheral line management practices may
      be warranted.
    action_low: >-
      This may reflect effective peripheral line management
      practices.
    action_low_narrowed: >-
      The low infection rate may partly reflect lower peripheral line
      exposure rather than care practices alone.
    metric_label: "PVC-associated sepsis/BSI rate"
    paired_label: "PVC utilization"
  # Definitions 7–9: VS/INV/NIV-associated pneumonia ↔ utilization (simple)
  pairing_dev_ass_vs:
    above_is_concerning: true
    action_elevated: >-
      Respiratory care practices and pneumonia prevention measures may
      be relevant areas for assessment.
    action_elevated_narrowed: >-
      A focused review of respiratory care practices and pneumonia
      prevention measures may be warranted rather than utilization
      patterns.
    action_low: >-
      Pathogen detection rates
      (@tbl-infectious-agent-detection-rate) may help confirm this
      reflects effective ventilatory care rather than differences in
      diagnostic practices.
    action_low_narrowed: >-
      The low pneumonia rate may partly reflect lower ventilatory
      support exposure rather than care practices alone.
    metric_label: "ventilatory support-associated pneumonia rate"
    paired_label: "ventilatory support utilization"
    paired_label_sc: "Ventilatory support utilization"
  # Definition 3: Pneumonia ↔ VAP (primary) + VS util (fallback)
  pairing_hap:
    above_is_concerning: true
    action_elevated: >-
      Ventilatory support practices, including ventilator care bundles
      and weaning protocols, may be relevant areas for assessment.
    action_elevated_narrowed: >-
      The elevation may be concentrated in non-ventilator-associated
      pneumonia. Pneumonia diagnostic criteria and pathogen detection
      (@tbl-infectious-agent-detection-rate) may warrant review.
    action_low: >-
      Pathogen detection for pneumonia
      (@tbl-infectious-agent-detection-rate) may help confirm this
      reflects effective respiratory care rather than differences in
      diagnostic practices.
    action_low_narrowed: >-
      Pneumonia diagnostic criteria and case ascertainment practices
      may warrant review.
    fallback_paired_label: "ventilatory support utilization"
    fallback_paired_label_sc: "Ventilatory support utilization"
    metric_label: "pneumonia rate"
    primary_paired_label: "ventilator-associated pneumonia rates"

  # Definition 4: NEC ↔ human milk (primary) + probiotics (secondary)
  pairing_nec:
    above_is_concerning: true
    action_elevated: >-
      Strengthening lactation support, donor milk availability, or
      feeding pathways may help reduce necrotising enterocolitis risk.
    action_elevated_narrowed: >-
      Case mix, feeding advancement protocols, and necrotising
      enterocolitis diagnostic criteria may warrant review.
    action_elevated_secondary: >-
      Feeding protocols, probiotic administration practices, and
      antibiotic stewardship may be relevant considerations.
    action_low: >-
      This may reflect effective feeding and protective care
      practices or case mix differences.
    metric_label: "necrotising enterocolitis rate"
    primary_paired_label: "human milk exposure"
    primary_paired_label_sc: "Human milk exposure"
    secondary_paired_label: "probiotic exposure"
    secondary_paired_label_sc: "Probiotic exposure"
  # ── Metric pairing definitions ────────────────────────────────
  # Definition 1: Severe infection (unpaired — directs to components)
  pairing_severe_infection:
    action_elevated: >-
      The component rates (primary sepsis/BSI and pneumonia) and the
      device-associated infection rates
      (@tbl-device-associated-incidence-density-rates) may help
      identify where the elevation is concentrated.
    action_low: >-
      Diagnostic completeness (@tbl-infectious-agent-detection-rate)
      may help confirm this is supported by thorough microbiological
      workup.
    metric_label: "overall severe infection rate"
  resistance_test_interpretation_routine_high: >-
    High resistance testing rates suggest thorough screening
    practices, which may improve detection of resistant organisms.

  # ── Resistance testing interpretation ──────────────────────────────
  resistance_test_interpretation_routine_low: >-
    Low resistance testing rates may limit the ability to detect
    resistant organisms. This could affect both clinical management
    and the accuracy of reported resistance rates.

  # ── Secondary BSI interpretation ───────────────────────────────────
  secondary_bsi_interpretation_multiple_above: >-
    Secondary bloodstream infection rates are above the reference range for multiple
    primary infection types. This may suggest broader challenges
    related to secondary bloodstream infections following primary
    infection events.

  # ── Severe infection interpretation ────────────────────────────────
  severe_infection_interpretation_all_above: >-
    Both primary sepsis/BSI and pneumonia rates are above the reference range. This
    pattern may suggest broader infection prevention challenges
    rather than a single-pathway issue.
  severe_infection_interpretation_all_below: >-
    Both primary sepsis/BSI and pneumonia rates are below the reference range. This
    favourable pattern may reflect effective infection prevention
    across multiple pathways.
  # Single-metric fallback
  severe_infection_interpretation_bsi_high: >-
    The primary sepsis/BSI rate is above the reference range, which may reflect
    vascular access practices, diagnostic intensity, or case mix
    differences.
  # Cross-table context
  severe_infection_interpretation_bsi_high_cvc_high: >-
    The primary sepsis/BSI rate is above the reference range in a context where CVC
    utilization is also high. Vascular access practices may be a
    relevant area for assessment.
  severe_infection_interpretation_bsi_high_hap_low: >-
    The primary sepsis/BSI rate is above the reference range while the pneumonia rate is
    below it. This may point to vascular access-related factors as
    a primary area for further assessment.
  severe_infection_interpretation_bsi_low: >-
    The primary sepsis/BSI rate is below the reference range, which may reflect
    effective vascular access-related infection prevention practices.
  severe_infection_interpretation_hap_high: >-
    The pneumonia rate is above the reference range, which may reflect
    ventilatory care practices, diagnostic criteria, or case mix
    differences.
  severe_infection_interpretation_hap_high_bsi_low: >-
    The pneumonia rate is above the reference range while the primary sepsis/BSI rate is
    below it. This may point to ventilatory care-related factors as
    a primary area for further assessment.
  severe_infection_interpretation_hap_high_inv_high: >-
    The pneumonia rate is above the reference range in a context where
    invasive ventilation utilization is also high. Ventilation care
    practices may be a relevant area for assessment.
  severe_infection_interpretation_hap_low: >-
    The pneumonia rate is below the reference range, which may reflect
    effective respiratory care-related infection prevention practices.
  severe_infection_si_zero: >-
    No severe infections (primary sepsis/BSI or pneumonia) were recorded during the
    surveillance period despite available patient day data. This may
    indicate incomplete data capture, a very small population, or
    generation of the report very early after starting surveillance.

  # ── Surgery interpretation ─────────────────────────────────────────
  surgery_rate_interpretation_multiple_above: >-
    Multiple surgery categories are above the reference range. This
    may reflect a higher-acuity case mix or a surgical referral
    centre profile.
  surgery_rate_overall_zero: >-
    No surgical procedures were recorded during the surveillance
    period despite available patient data.
  vascular_catheter_interpretation_both_above: >-
    Both CVC and PVC utilization are above the reference range,
    suggesting higher overall vascular access burden. This may
    reflect case mix or clinical practice differences.
  vascular_catheter_interpretation_both_below: >-
    Both CVC and PVC utilization are below the reference range. This
    may reflect lower acuity or successful line-reduction strategies.
  vascular_catheter_interpretation_cvc_high_pvc_low: >-
    CVC utilization is above the reference range while PVC
    utilization is below it. This may suggest greater reliance on
    central access, which is associated with different complication
    profiles.

  # ── Vascular catheter interpretation ───────────────────────────────
  vascular_catheter_interpretation_pvc_high_cvc_low: >-
    PVC utilization is above the reference range while CVC
    utilization is below it. This pattern may suggest a
    peripheral-access preference that reduces central-line exposure.

  # ── Ventilatory support interpretation ─────────────────────────────
  ventilatory_support_interpretation_all_above: >-
    Both non-invasive and invasive ventilation are above the reference
    range, suggesting higher overall respiratory support burden. This
    may reflect differences in case mix or ventilation practices.
  ventilatory_support_interpretation_all_below: >-
    Both non-invasive and invasive ventilation are below the reference
    range. This may reflect lower acuity or different respiratory
    management strategies.
  ventilatory_support_interpretation_inv_high_niv_low: >-
    Invasive ventilation is above the reference range while
    non-invasive ventilation is below it. This pattern may suggest
    a higher threshold for initiating non-invasive support or
    differences in escalation and weaning practices.
  ventilatory_support_interpretation_niv_high_inv_low: >-
    Non-invasive ventilation is above the reference range while
    invasive ventilation is below it. This pattern may be consistent
    with a non-invasive-first strategy that reduces the need for
    intubation.
  ventilatory_support_vs_zero: >-
    No ventilatory support exposure was recorded during the
    surveillance period despite available patient day data. This may
    indicate incomplete data capture, a very small population, or
    generation of the report very early after starting surveillance.
