outlier:
  above_q3_group: |
    The following metrics are above the 75th percentile of the reference population:
    METRIC_LIST
    These elevated values warrant further investigation to identify potential causes and opportunities for targeted interventions.
  above_q3_single: >
    Your department's METRIC_NAME is above the 75th percentile of the reference population.
    This elevated rate warrants review to identify potential factors contributing to this
    difference and to evaluate whether additional prevention measures may be beneficial.
  below_q1_group: |
    The following metrics are below the 25th percentile of the reference population:
    METRIC_LIST
    These lower values may reflect successful prevention strategies or reduced exposure to risk factors in your unit.
  below_q1_single: >
    Your department's METRIC_NAME is below the 25th percentile of the reference population.
    This may indicate effective practices that could be shared, or alternatively, may warrant
    investigation to ensure adequate screening and detection.
  caution_limited_data: >
    Note: The reference data is based on fewer than 5 contributing departments. Comparisons
    should be interpreted with caution due to limited sample size.
  grouped_antibiotic_rates_a_high: >
    AWaRe Access-group antibiotic exposure is above the reference interquartile
    range. This may represent strong alignment with first-line prescribing or
    high overall treatment burden. Confirm appropriateness of indications and
    durations, and monitor outcomes and resistance trends.
  grouped_antibiotic_rates_a_high_r_high: >
    Combined AWaRe profile: AWaRe Access-group exposure is above the reference range;
    AWaRe Reserve-group exposure is above the reference range. This pattern may reflect
    higher treatment burden or slower de-escalation in one or more categories. Review
    indication quality, AWaRe mix, treatment duration, de-escalation timing, and outcomes
    by category.
  grouped_antibiotic_rates_a_high_r_inbetween: >
    Combined AWaRe profile: AWaRe Access-group exposure is above the reference range;
    AWaRe Reserve-group exposure is within the reference range. This pattern may reflect
    higher treatment burden or slower de-escalation in one or more categories. Review
    indication quality, AWaRe mix, treatment duration, de-escalation timing, and outcomes
    by category.
  grouped_antibiotic_rates_a_high_r_low: >
    Combined AWaRe profile: AWaRe Access-group exposure is above the reference range;
    AWaRe Reserve-group exposure is below the reference range. This mixed pattern suggests
    heterogeneity across categories and supports targeted review rather than
    one-size-fits-all interpretation. Review indication quality, AWaRe mix, treatment
    duration, de-escalation timing, and outcomes by category.
  grouped_antibiotic_rates_a_high_w_high: >
    Combined AWaRe profile: AWaRe Access-group exposure is above the reference range;
    AWaRe Watch-group exposure is above the reference range. This pattern may reflect
    higher treatment burden or slower de-escalation in one or more categories. Review
    indication quality, AWaRe mix, treatment duration, de-escalation timing, and outcomes
    by category.
  grouped_antibiotic_rates_a_high_w_high_r_high: >
    Combined AWaRe profile: AWaRe Access-group exposure is above the reference range;
    AWaRe Watch-group exposure is above the reference range; AWaRe Reserve-group
    exposure is above the reference range. More than one component is above range,
    suggesting broad prescribing intensity rather than a single-category signal. Read
    this together with resistance and pathogen detection results, as both Watch- and
    Reserve-group use may be expected to increase where resistant or multidrug-resistant
    pathogens are common or confirmed by microbiological diagnostics.
  grouped_antibiotic_rates_a_high_w_high_r_inbetween: >
