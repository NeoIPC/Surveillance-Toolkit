    a de-escalation gradient from Access towards lower Watch and Reserve exposure,
    consistent with more conservative spectrum use. Read this together with resistance
    and pathogen detection results, as Reserve-group use in the reference range may
    reflect selective use in microbiologically documented high-resistance infections.
