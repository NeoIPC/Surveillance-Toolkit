  singleCountryHintHeader: National benchmark
  singleCountryHint: The reference data presents information from neonatal units in a single country. This provides a more relevant benchmark due to the relative homogeneity of the healthcare system.
  countryMismatchHint: Your unit's country differs from the reference data countries. This may limit comparability.
  filterDiffersFootnote: "Note: This filter differs from the reference dataset."
