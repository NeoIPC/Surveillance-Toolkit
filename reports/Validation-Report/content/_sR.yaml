      form status is '%s'). See @sec-problem-details-7.
  "9":
    description: >-
      The patient record has a completed enrolment or surveillance end form
      but a pneumonia form is not completed (enrolment status is '%s',
      surveillance end form status is '%s', pneumonia form status is '%s').
      See @sec-problem-details-7.
