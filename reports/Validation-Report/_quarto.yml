project:
  output-dir: _output
execute:
  keep-md: true
date-meta: now
number-sections: true
echo: false
format:
  pdf:
    documentclass: scrartcl
    papersize: a4paper
    fig-pos: 'h'
    colorlinks: true
  docx:
    highlight-style: github
    number-sections: true
    reference-doc: ../common/reference.docx
filters: ["../filters/pandoc-quotes.lua"]
profile:
  group: 
    - [en, de]