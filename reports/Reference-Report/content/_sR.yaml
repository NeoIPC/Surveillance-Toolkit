  datasetCompositionHeader: Dataset composition
  singleCountryDatasetHint: This report presents data from neonatal units in a single country. Because of the relative homogeneity of the healthcare system, it is in principle a good benchmark. However, it should be noted that only a proportion of neonatal units in a country actually participate in NeoIPC Surveillance. Since participation is voluntary, these are typically hospitals that have a particular interest in infection prevention and are willing and able to provide the resources required for surveillance. The information presented here can therefore not fully describe the situation in the individual countries.
  multiCountryDatasetHint: This report aggregates data from neonatal units in several countries. While ideally a single-country report would be preferable, aggregating data across multiple countries is pragmatically necessary when sufficient participation from a single country is not available. This means that, while it reflects a broad spectrum of care structures, it is only suitable as a benchmark to a somewhat limited extent due to the sometimes very different healthcare systems and the resources available there. The aim of NeoIPC Surveillance is therefore always to provide units with a relevant national or regional report, provided that a sufficient number of units in the respective region participate in the system.
  mixedWbClassAddendum: "Additionally, this dataset includes data from countries whose economies belong to different income groups, as defined by the World Bank (%s). This means that the healthcare systems and infrastructure of the included countries may vary considerably, which could further affect the interpretation and comparability of some indicators."
  specialAnalysisHint: This is a special analysis that
  includesTestDepartments: includes test units
  and: ' and '
  ignoresInclusionCriteria: ignores the NeoIPC Surveillance inclusion criteria.

