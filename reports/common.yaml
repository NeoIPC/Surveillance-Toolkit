methods:
  heading: "Methodology"
  pooled_rate: >-
    The pooled rate is the arithmetic mean across all individual records in the
    reference population. Because it is calculated at the patient level rather
    than as an average of department-level rates, the pooled rate can fall outside
    the interquartile range, which is derived from department-level rates.
  quartiles: >-
    Reference data quartiles represent the 25th percentile (Q₁), median (Q₂) and
    75th percentile (Q₃) of department-level rates. Quartiles are displayed only
    when at least five departments contribute to the denominator and the metric is
    frequent enough that a typical department would be expected to observe at least
    one event based on the pooled rate. When these conditions are not met,
    quartiles are suppressed to avoid presenting unreliable distributional
    estimates.
  ci_rates: >-
    Confidence intervals for rates use exact Poisson methods when the denominator
    is an exposure measure (such as patient-days or device-days) and Wilson score
    intervals when the denominator is a count of discrete entities (such as the
    number of infections or pathogens tested). Both methods provide reliable
    coverage for small counts including zero.
  ci_quartile_bootstrap: >-
    Confidence intervals for reference quartiles are computed using a parametric
    bootstrap that propagates both within-department sampling uncertainty and
    cross-department distributional uncertainty. Department-level rates are
    resampled 2,000 times using non-informative prior distributions, and quartiles
    are recalculated for each iteration. The reported bounds represent the 2.5th
    and 97.5th percentiles of the bootstrap distribution.
  ci_quartile_auto_note: >-
    Bootstrap confidence intervals for reference quartiles are displayed only for
    metrics where quartile values are not suppressed.
  sparse_data: >-
    Rates based on small numbers of events are inherently unstable and may not
    reflect systematic patterns. Where this applies, individual table rows are
    flagged accordingly.
  patient_population: >-
    Birth weight and gestational age are the primary case-mix descriptors in
    neonatal surveillance. Lower birth weight and earlier gestational age are
    associated with increased vulnerability to healthcare-associated infections.
    The figures show both the frequency distribution (histogram with density
    curve) and summary statistics (boxplot with quartiles and pooled arithmetic
    mean).
  incidence_density: >-
    Incidence density rates are calculated per 1,000 patient-days, allowing
    comparison between departments with different patient volumes and lengths of
    stay. The primary sepsis/BSI category includes both clinical sepsis and
    laboratory-confirmed bloodstream infections.
  device_associated: >-
    Device-associated infections are defined by a time-based association
    according to the NeoIPC Core Protocol: a vascular catheter must have been in
    place for at least three consecutive days, and ventilatory support for at
    least four calendar days, before an infection on that day or the day before
    qualifies as device-associated. This represents a temporal rather than a
    proven causal relationship. The denominator is device-days — only days on
    which the device was present.
  secondary_bsi: >-
    A secondary bloodstream infection is a BSI attributed to a site-specific
    infection (pneumonia, NEC, or SSI) when the same organism is identified
    within a 17-day window around the primary infection (3 days before through
    13 days after). Catheter-associated infections are excluded. Secondary BSI
    rates tend to have small event counts, which frequently leads to quartile
    suppression.
  agent_per_infection: >-
    The agent-per-infection rate measures how frequently specific pathogens are
    detected relative to the number of infections in which any infectious agent
    was identified. Values above 100% are expected and indicate polymicrobial
    infections. Diagnostic challenges specific to neonates — including low blood
    volume reducing culture sensitivity and elevated contamination risk — may
    influence detection patterns.
  resistant_pathogens: >-
    This section reports the rate at which detected pathogens carry specific
    resistance markers. An empty table indicates that no resistant organisms were
    detected among tested pathogens — it does not indicate that testing was not
    performed. Resistance testing completeness is reported separately in the
    antimicrobial susceptibility testing section.
  infectious_agent_detection: >-
    The infectious agent detection rate measures the proportion of infections in
    which at least one infectious agent was identified. Higher detection rates
    for sepsis/BSI may reflect thorough microbiological workup practices. Lower
    detection rates for NEC are expected because the NEC surveillance definition
    is based on radiological and clinical criteria, and pathogens are only
    recorded when a secondary bloodstream infection occurs.
  resistance_test: >-
    The antimicrobial susceptibility testing (AST) rate measures the proportion
    of eligible pathogens for which a resistance test result was recorded. Low
    AST rates may indicate gaps in microbiological diagnostic capacity and can
    limit the ability to detect resistant organisms.
  risk_density: >-
    Exposure density rates measure the number of days a risk or protective factor
    was present per 100 patient-days. Device and ventilation days require the
    device or support to be in place for at least 12 hours on that calendar day.
    A human milk day requires that the patient's enteral feeding exclusively
    consists of human milk (including donor milk and fortified breast milk).
    Probiotic days require an oral probiotic containing Lactobacillus spp. or
    Bifidobacterium spp. A kangaroo care day is recorded when the patient
    received intensive skin-to-skin contact for at least 2 hours on a given
    calendar day. Antibiotic days are counted from the first dose to the last
    dose of a therapy inclusive, including days where doses were skipped, but not
    days after the last dose. Antibiotic exposure is recorded per individual
    substance. For reporting, substance-days are aggregated into WHO AWaRe
    categories (Access, Watch, Reserve); combination therapy means a single
    patient-day may contribute substance-days to multiple categories.
  surgical_procedures: >-
    Surgical procedure rates are calculated per 100 patients, not per 1,000
    patient-days. One patient may contribute multiple procedures.
