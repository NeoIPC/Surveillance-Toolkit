      no-bnch: "A is a histogram in %s steps with a density curve and B is a boxplot."
    - bnch: "Vertical lines in the boxplots represent the %s, %s and %s quantiles, the diamonds represent the pooled arithmetic means."
      no-bnch: "Vertical lines in the boxplot represent the %s, %s and %s quantiles, the diamond represents the pooled arithmetic mean."
tbl-incidence-density-rates:
  tbl-cap: "Incidence Density Rates of nosocomial infections"
  si: "Severe infection"
  bsi: "Primary sepsis/BSI"
  hap: "Pneumonia"
  nec: "Necrotising Enterocolitis"
  grp_si: "Primary sepsis/BSI/Pneumonia"
  grp_othr: "Other"
  incidence_density_rate: "Incidence Density Rate"
  n_inf: "Number of infections"
  n_footnote: "%s: The aggregated number of infections in all infants."
  pooled_footnote: "%s: The Incidence Density Rate calculated across all infants from all departments."
  quartile_footnote: "%s, %s, %s: The quartiles (%s, %s and %s quantiles) of the Incidence Density Rates of the partner departments. These quartiles are only displayed when the number of departments contributing to the denominator is greater than or equal to five, and when the median number of expected infections is greater than or equal to one according to the pooled Incidence Density Rate."
  si_footnote: "%s: Combines the outcomes primary sepsis/BSI and pneumonia"
tbl-device-associated-incidence-density-rates:
  tbl-cap: "Incidence Density Rates of device-associated infections"
  cvc: "CVC"
  pvc: "PVC"
  vs: "Any ventilatory support"
  inv: "INV"
  niv: "NIV"
  grp_vc: "Vascular catheter associated sepsis / bloodstream infection"
  grp_vs: "Ventilatory support associated pneumonia"
  dev_ass_incidence_density_rate: "Device-Associated Incidence Density Rate"
  n_dev_ass_inf: "Number of device-associated infections"
  n_dev_days: "Device days"
  n_footnote: "%s: The aggregated number of device-associated infections in all infants."
  pooled_footnote: "%s: The Device-Associated Incidence Density Rate calculated across all infants from all departments."
  quartile_footnote: "%s, %s, %s: The quartiles (%s, %s and %s quantiles) of the Device-Associated Incidence Density Rates of the partner departments. These quartiles are only displayed when the number of departments contributing to the denominator is greater than or equal to five, and when the median number of expected infections is greater than or equal to one according to the pooled Device-Associated Incidence Density Rate."
