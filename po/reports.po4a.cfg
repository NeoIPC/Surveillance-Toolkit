[po4a_langs] af de es et fr gr it ne tr
[po4a_paths] po/reports.pot $lang:po/reports.$lang.po
[options] --width 0 --master-charset UTF-8 --localized-charset UTF-8 --wrap-po newlines --master-language en --msgid-bugs-address NeoIPC-Support@charite.de --copyright-holder "Charité – Universitätsmedizin Berlin" --package-name "NeoIPC Surveillance Reports" --package-version 0.9

# Common
[type: yaml] reports/common.yaml $lang:reports/common.$lang.yaml opt:"-o keys='3gcr abdominal_surgery access antibiotics any any_antibiotic aware_footnote bnch bsi car cardiac_and_large_vessel_surgery cor cvc day days_with_risk_factor dev_ass_incidence_density_rate digit_group_separator fig-bw fig-cap fig-ga gramm_abbreviation grp_othr grp_si grp_vc grp_vs hap human_milk if_3gcr if_3gcr_and_car incidence_density_rate inguinal_hernia_surgery inv kangaroo_care lung_pleural_space_thoracic_surgery mrsa n n_dev_ass_inf n_dev_days n_footnote n_inf nec neurosurgery niv no-bnch not_surgery oesophageal_surgery other overall own patient_days percent_symbol pooled pooled_footnote probiotic pvc q1 q2 q3 quartile_footnote rate rate_denominator rate_footnote rate_name rate_numerator ref reserve risk_density_rate si si_footnote ssi table_headers tbl-abr-infection-rate tbl-agent-per-infection-rate tbl-cap tbl-device-associated-incidence-density-rates tbl-incidence-density-rates tbl-infectious-agent-detection-rate tbl-resistance-test-rate tbl-risk-density-rates tbl-surgical-procedure-rates to_be_categorised total unit_separator vascular_catheter ventilatory_support vre vs watch week_abbreviation'"

# Partner Report
[type: yaml] reports/Partner-Report/_quarto-en.yml $lang:reports/Partner-Report/_quarto-$lang.yml opt:"-o keys='title'"
[type: yaml] reports/Partner-Report/content/_sR.yaml $lang:reports/Partner-Report/content.$lang/_sR.yaml opt:"-o keys='own_unit reference_data'"
[type: text] reports/Partner-Report/content/_introduction.qmd $lang:reports/Partner-Report/content.$lang/_introduction.qmd opt:"-o markdown" opt:"-o neverwrap"

# Partner Certificate
[type: yaml] reports/Partner-Certificate/_quarto-en.yml $lang:reports/Partner-Certificate/_quarto-$lang.yml opt:"-o keys='author-meta format keywords pdf title'"
[type: yaml] reports/Partner-Certificate/_sR.yaml $lang:reports/Partner-Certificate/_sR.$lang.yaml opt:"-o keys='content signature_offset'"

# Reference Report
[type: yaml] reports/Reference-Report/_quarto-en.yml $lang:reports/Reference-Report/_quarto-$lang.yml opt:"-o keys='author-meta file format include-in-header keywords pdf title'" # exclude: text
[type: yaml] reports/Reference-Report/content/_sR.yaml $lang:reports/Reference-Report/content.$lang/_sR.yaml opt:"-o keys='allBirthweights allGestationalAges analysisPeriod and birthweightFilter countries country countryNames createdAt dataUpTo Estonia Germany gestationalAgeFilter Greece headerList ignoresInclusionCriteria includesTestDepartments Italy multiCountryHint multiCountryHintGoal multiCountryHintHeader singleCountryHint singleCountryHintHeader singleCountryRepresentativenessHint SouthAfrica Spain specialAnalysisHint Switzerland UnitedKingdom'"
[type: latex] reports/Reference-Report/translations.tex $lang:reports/Reference-Report/translations.$lang.tex
[type: text] reports/Reference-Report/content/_introduction.Rmd $lang:reports/Reference-Report/content.$lang/_introduction.Rmd opt:"-o markdown" opt:"-o neverwrap"
[type: text] reports/Reference-Report/content/_patient_population.Rmd $lang:reports/Reference-Report/content.$lang/_patient_population.Rmd opt:"-o markdown" opt:"-o neverwrap"
[type: text] reports/Reference-Report/content/_nosocomial_infections.Rmd $lang:reports/Reference-Report/content.$lang/_nosocomial_infections.Rmd opt:"-o markdown" opt:"-o neverwrap"
[type: text] reports/Reference-Report/content/_infectious_agents.Rmd $lang:reports/Reference-Report/content.$lang/_infectious_agents.Rmd opt:"-o markdown" opt:"-o neverwrap"
[type: text] reports/Reference-Report/content/_risk_and_protective_factors.Rmd $lang:reports/Reference-Report/content.$lang/_risk_and_protective_factors.Rmd opt:"-o markdown" opt:"-o neverwrap"
[type: text] reports/Reference-Report/content/_surgery.Rmd $lang:reports/Reference-Report/content.$lang/_surgery.Rmd opt:"-o markdown" opt:"-o neverwrap"
