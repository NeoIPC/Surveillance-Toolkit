# Shared-input versions this NeoIPC DHIS2 Metadata Package release incorporates.
#
# The metadata package embeds pathogen and antimicrobial option sets derived from the infectious
# agent list and the antibiotics list, but those lists are their own independently-versioned
# products. This file records which released version of each the metadata package incorporates.
#
# CI enforces at every metadata-v* release that, for each list here:
#   1. the <list>-v<version> release tag exists, and
#   2. the list's committed source at this commit is byte-identical to what that release shipped.
# If a list changed since its release, bump metadata/common/<list>/VERSION, publish an <list>-v<new>
# release, then set the value here to <new> before releasing the metadata package. (Translations are
# not part of this check — see RELEASING.md.)

incorporates:
  infectious-agents: 0.0.1-alpha
  antibiotics: 0.0.1-alpha
