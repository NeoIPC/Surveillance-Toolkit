# NeoIPC Surveillance Glossary
#
# Managed via monolingual gettext PO for Weblate (not po4a).
# Run `python scripts/update-glossary-po.py` after editing this file.
#
# Weblate feature mapping (YAML → PO):
#   Plurals       — key + key_plural paired into msgid / msgid_plural
#   Descriptions  — YAML comments above a key become PO translator notes (#.)
#   Context       — YAML key becomes msgctxt (enables variant_regex grouping)
#   Location      — source file path + line number written as #: occurrence
#   Flags         — `# flags: ...` comment line becomes PO #, flags
#   Needs editing — fuzzy flag in .po, managed by Weblate; preserved across merges
#
# Naming convention:
#   base key    = AMA canonical (lowercase)
#   key_sc      = Sentence case (first word capitalised)
#   key_tc      = Title case (all major words capitalised)
#   key_plural  = Plural form
#   Suffixes can combine: key_plural_tc
#   Abbreviations (CVC, HAP, INV, NEC, SSI) are always uppercase — no variants.
#   Proper nouns (NeoIPC Surveillance) keep their canonical casing.
#
# Available flags (see https://docs.weblate.org/en/latest/admin/checks.html):
#   read-only          — non-editable, translation locked
#   ignore-same        — suppress "unchanged translation" warning
#   max-length:N       — character limit
#   priority:N         — translation priority (default 100)
#   placeholders:...   — expected placeholder strings
#   regex:PATTERN      — translation must match regex
#
# Variant grouping is handled by the Weblate component's variant_regex
# setting: _(tc|sc|plural|plural_tc|plural_sc)$

